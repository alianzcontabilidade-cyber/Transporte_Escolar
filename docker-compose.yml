version: '3.8'

services:
  # ── Banco de dados MySQL ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: transescolar_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: transescolar
      MYSQL_USER: transescolar
      MYSQL_PASSWORD: transescolar123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ── Backend API ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: transescolar_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://transescolar:transescolar123@db:3306/transescolar"
      JWT_SECRET: "dev-secret-troque-em-producao-123456789"
      JWT_EXPIRES_IN: "7d"
      PORT: 3000
      WEB_URL: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard Web ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: "http://localhost:3000"
    container_name: transescolar_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql_data:
