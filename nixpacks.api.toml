[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build --workspace=apps/web && npm run build --workspace=packages/api && cp -r apps/web/dist/* packages/api/public/"]

[start]
cmd = "cd packages/api && npx tsx src/migrate.ts && node dist/index.js"
